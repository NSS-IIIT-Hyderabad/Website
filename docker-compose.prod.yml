version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: nss-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: nss_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - app-network

  # Backend API Service (Multiple instances for load balancing)
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nss-backend-1
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://admin:password123@mongodb:27017/nss_db?authSource=admin
      - API_ENV=${API_ENV:-production}
      - API_PORT=8000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - app-network

#  backend-2:
#    build:
#      context: ./backend/members
#      dockerfile: Dockerfile
#    container_name: nss-backend-2
#    restart: unless-stopped
#    environment:
#      - MONGODB_URL=mongodb://admin:password123@mongodb:27017/nss_db?authSource=admin
#      - API_ENV=production
#      - API_PORT=8000
#    depends_on:
#      - mongodb
#    volumes:
#      - ./backend/members:/app
#    networks:
#      - app-network

  # Frontend Service (Multiple instances for load balancing)
  frontend-1:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nss-frontend-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://nginx/api
    depends_on:
      - backend-1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - app-network
#
#  frontend-2:
#    build:
#      context: ./frontend
#      dockerfile: Dockerfile
#    container_name: nss-frontend-2
#    restart: unless-stopped
#    environment:
#      - NODE_ENV=production
#      - NEXT_PUBLIC_API_URL=http://nginx/api
#    depends_on:
#      - backend-1
#      - backend-2
#    volumes:
#      - ./frontend:/app
#      - /app/node_modules
#      - /app/.next
#    networks:
#      - app-network

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nss-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend-1
      - backend-1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
