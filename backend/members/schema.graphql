type Member {
  name: String!
  email: String!
  rollNumber: String
  team: MemberTypeEnum!
  isHead: Boolean!
  status: MemberStatusEnum!
  createdAt: String
  updatedAt: String
}

input MemberInput {
  name: String!
  email: String!
  rollNumber: String = null
  team: MemberTypeEnum!
  isHead: Boolean! = false
  status: MemberStatusEnum!
}

enum MemberStatusEnum {
  ACTIVE
  INACTIVE
}

enum MemberTypeEnum {
  ADMIN
  TECH
  DESIGN
  CONTENT
  LOGISTICS
  COORDINATOR
  VOLUNTEER
}

type Mutation {
  addMember(member: MemberInput!): Boolean!
  changeMember(member: MemberInput!): Boolean!
}

type Query {
  viewMembers(name: String! = "", team: [MemberTypeEnum!]!): [Member!]!
}
