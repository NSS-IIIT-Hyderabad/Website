name: Deploy to Production Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify secrets configured
        run: |
          if [ -z "${{ secrets.SERVER_IP }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ Error: Required secrets not configured"
            echo "Please add SERVER_IP, SERVER_USER, and SERVER_SSH_KEY to GitHub Secrets"
            exit 1
          fi
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          
          script: |
            set -e
            
            # Colors for output
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            NC='\033[0m'
            
            PROJECT_DIR="$HOME/apps/NSS-Website"
            
            echo -e "${YELLOW}[GitHub Actions] Starting deployment...${NC}"
            
            # Check if project directory exists
            if [ ! -d "$PROJECT_DIR" ]; then
              echo -e "${RED}Error: Project directory not found at $PROJECT_DIR${NC}"
              exit 1
            fi
            
            # Navigate to project
            cd "$PROJECT_DIR"
            
            # Pull latest changes
            echo -e "${YELLOW}Pulling latest changes from GitHub...${NC}"
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Build Docker images
            echo -e "${YELLOW}Building Docker images...${NC}"
            docker-compose -f docker-compose.prod.yml build --no-cache
            
            # Stop old containers gracefully
            echo -e "${YELLOW}Stopping old containers...${NC}"
            docker-compose -f docker-compose.prod.yml down
            
            # Start new containers
            echo -e "${YELLOW}Starting new containers...${NC}"
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait for services to start
            echo -e "${YELLOW}Waiting for services to be healthy...${NC}"
            sleep 15
            
            # Health check
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo -e "${GREEN}✓ Health check passed!${NC}"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo -e "${YELLOW}Health check failed, retrying ($RETRY_COUNT/$MAX_RETRIES)...${NC}"
                  sleep 5
                else
                  echo -e "${RED}✗ Health check failed after $MAX_RETRIES attempts${NC}"
                  echo -e "${YELLOW}Checking logs for errors:${NC}"
                  docker-compose -f docker-compose.prod.yml logs --tail=50
                  exit 1
                fi
              fi
            done
            
            # Cleanup old Docker images
            echo -e "${YELLOW}Cleaning up unused Docker images...${NC}"
            docker image prune -a -f > /dev/null 2>&1 || true
            
            # Show service status
            echo -e "${GREEN}Service Status:${NC}"
            docker-compose -f docker-compose.prod.yml ps
            
            echo -e "${GREEN}✓ Deployment successful!${NC}"
      
      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
      
      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Check server logs with: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'cd ~/apps/NSS-Website && docker-compose -f docker-compose.prod.yml logs -f'"
        
      - name: Log deployment info
        if: always()
        run: |
          echo "Deployment completed at $(date)"
          echo "Status: ${{ job.status }}"

